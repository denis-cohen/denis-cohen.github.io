# Dynamic multi-party competition

.panelset.sideways[
.panel[.panel-name[Parties]

.font90[

### The interplay of strategic party behavior

- Parties concurrently employ strategies &amp;mdash; policies, personnel, valence appeals, ...
- Voters observe each party's strategy and, thus, their joint interplay

### Party strategies

- Goals: maximize .emph1[retention], minimize .emph1[defection], and/or maximize .emph1[attraction]
- Purse distinct electoral potentials `\(\rightarrow\)` target specific competitors
- Trade-offs: net gains from one competitor, net losses to another

]
]

.panel[.panel-name[Voters]

.font90[

### Framework: Comparative vote switching

Dynamic multi-party competition is a polyadic zero-sum game .emph2[(Cohen et al., 2024)]:
- parties do not simply grow or shrink&amp;mdash;they .emph1[exchange voters]
- these exchanges unfold across .emph1[all dyads]...
  - ...with varying intensity (.emph1[dyadic transfer volumes])
  - ...with varying results (.emph1[dyadic transfer balances])
]
]


.panel[.panel-name[Reactions]

.font90[

### Electoral reactions to party strategies

In this framework, party strategies can affect:

- parties' own support bases (.emph1[monadic effects])
- voter exchanges with each competitor (.emph1[dyadic effects])
- broader shifts in the party system (.emph1[systemic effects])

]
]

.panel[.panel-name[Goal]

.font90[

### The goal of this research

1. Model the .emph2[effects of nominal party strategies] (`\(X\)`)...
1. ...on the .emph2[polyadic voter flows] that unfold between elections (`\(Y\)`),...
1. ...such that it generalizes across .emph2[heterogeneous party systems],...
1. ...accounts for .emph2[each party]'s strategic behavior...
1. ...and .emph2[interdependent effects] of party behaviors,...
1. ...accommodates .emph2[context sensitivity],...
1. ...defines .emph2[meaningful effects],...
1. ...and yields .emph2[intuitive quantities] to inform substantive debates.
]
]
]

#  Modeling dynamic multi-party competition

.panelset.sideways[
.panel[.panel-name[Generalized]

### Starting point: Generalized transition matrices


&lt;img src="presentation-04_files/figure-html/color-transition-matrix-4-1.png" width="80%" style="display: block; margin: auto;" /&gt;

.font70[
1. .emph1[Generalized transition matrices] (e.g., party families) 
2. .emph1[Election-level] predictors only (e.g., economic growth)
]

]

.panel[.panel-name[Nominal]

### Nominal transition matrices

.pull-left[

&lt;img src="presentation-04_files/figure-html/color-transition-matrix-2-1.png" width="100%" style="display: block; margin: auto;" /&gt;
]
.pull-right.font70[
#### LHS data

.emph1[Cell counts from nominal transition matrices]

#### RHS data

1. .emph1[Election-specific covariates], `\(\mathbf{x}_j^{\prime}\)`
1. .emph1[Cell-specific covariates], `\(\mathbf{z}_{i_{[j,c]}}^{\prime}\)`
  - .emph2[Dyadic cells:] `\([z_1^{\text{s}} \text{ } z_2^{\text{r}}  \text{ } z_3^{\text{s} \times \text{r}}]\)`
  - .emph2[Mondadic (sender-only) cells:] `\([z_1^{\text{s}} \text{ } .  \text{ } .]\)`
  - .emph2[Mondadic (receiver-only) cells:] `\([. \text{ } z_2^{\text{r}} \text{ } .]\)`
  - .emph2[Niladic cells:] `\([. \text{ } .  \text{ } .]\)` 
]
]

.panel[.panel-name[Parameterization]

### Parameterization: Gerenalized cell classes `\(C\)`

.pull-left.font70[

#### Party families


&lt;img src="presentation-04_files/figure-html/color-transition-matrix-6-1.png" width="90%" style="display: block; margin: auto;" /&gt;

`$$\small C = \underbrace{8 \times 8}_{\substack{\text{6 families} \\ \text{+others} \\ \text{+non-voters}}} + \underbrace{6}_{\substack{\text{intra-} \\ \text{family} \\ \text{switchers}}} = 70$$`

]
.pull-right.font70[

#### Details

- Assign nominal cells, `\(i_{[j,c]} \in S_j\)` to .emph2[generalized cell classes], `\(c\)`
- Distinction within diagonal cells:
  - .emph1[Retention cells] (monadic)
  - .emph1[Intra-family switching cells] (dyadic)
]
]

.panel[.panel-name[Model]

### Model

.pull-left.font70[
#### Systematic + random components

`$$\small
\begin{aligned}
\small \eta_{i_{[j,c]}} = \underbrace{\alpha_c}_{\substack{C \text{ cell-class} \\ \text{intercepts}}} &amp; + \underbrace{ \sum_{k=1}^{K} x_{j}^{(k)} \beta_{c}^{(k)}}_{\substack{K \text{ election-specific} \\ \text{covariates}}} + \underbrace{ \sum_{m=1}^{M} \mathbf{z}_{i_{[j,c]}}^{(m)} \gamma_{c}^{(m)}}_{\substack{M \text{ cell-specific} \\ \text{covariates}}} \\ &amp; + \underbrace{\nu_{j,c}}_{\substack{\text{election/cell-class} \\ \text{deviations}}} - \underbrace{\log(m_{j,c})}_{\substack{\text{multiplicity} \\ \text{correction}}}
\end{aligned}$$`

#### Link function

`$$\small  \pi_{i_{[j,c]}} = \frac{\exp\left(\eta_{i_{[j,c]}}\right)}{\sum_{i \in S_j} \exp\left(\eta_{i_{[j,c]}}\right)} \text{ } \forall \text{ } i_{[j,c]} \in S_j, \text{ } j \in \{1,...,J\}$$`

#### Log-likelihood

`$$\small  \log L = \sum_{j=1}^{J} \sum_{i_{[j,c]} \in S_{j}} \underbrace{w_{i_{[j,c]}} \log \pi_{i_{[j,c]}}}_{\substack{\text{cell-frequency-weighted} \\ \text{log cell proportions}}}$$`
]

.pull-right.font70[
#### Details

- Mixed aggregate-level ASC logit
- Varying choice sets `\(S_j\)`
- Cell-class specific coefficients `\(\beta\)` and `\(\gamma\)`
- Idiosyncratic variation across elections:
  - Random deviations, `\(\nu_j^{\ast} \sim \text{MVN}(\mathbf{0}, \Sigma_{C \times C})\)`
  - Correlation (partly) addresses IIA
- Constraints:
  - Sparsity: `\(\gamma_{c,m} = 0\)` wherever `\(z_{i_{[j,c]}, m} = .\)`
  - Identification: `\(\beta_1 = -\Sigma_{c=2}^{C} \beta_c^{\ast}\)`
  - Identification: `\(\nu_{j,1} = -\Sigma_{c=2}^{C} \nu_{j,c}^{\ast}\)`
]
]

.panel[.panel-name[QOIs]

### Marginal counterfactuals

.font80[
- AMEs/FDs of relevant QOIs ( `\(Q \in \{G, L, V, B\}\)` )
  - calculated from election-averaged cell proportions under counterfactual scenarios
  - `\(\mathbb{E}[Q_j|x_j, z_{i[j,c]}^{\prime}] - \mathbb{E}[Q_j|x_j, z_{i[j,c]}^{\prime\prime}]\)`
- Meaningful counterfactual manipulations of `\(z\)` for .emph1[select marginal categories] of the generalized matrix
]

### Relative QOIs
.font80[
- Normalize QOI estimates by predicted support base at `\(t-1\)`
- Obtain QOIs as dynamic growth/shrinkage rates (percentual changes)
]
]
]

# Substantive take-aways


.font80[
When the .emph1[mainstream right and left] accommodate (as opposed to adopting balanced and adversarial stances):

1. MRP shrink by about `\(6\%\)` ( `\(\approx \frac{1}{2}\)` losses to RRP)
1. MLP experience increased volatility in their support base
1. RRP grow by about `\(16\%\)` (all due to gains from MRP)
]

--

.font80[
As far as broad, comparative, observational evidence goes:

- .emph2[Mainstream right as a key actor:] issue competition between proximal competitors
- .emph2[Strategic implication:] accommodation doesn't work
]

# Take-aways

- In multi-party systems, all parties:

  - compete with one another for voters `\(\rightarrow\)` .emph1[polyadic voter transitions]
  - concurrently employ strategies `\(\rightarrow\)` .emph1[polyadic strategizing]

--

- The interplay of party strategies affects every party's...

  - own support base (.emph1[monadic base effects])
  - voter exchanges with each competitor (.emph1[dyadic target effects])

--
